<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing change governance — Ninety One</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n1-dark: #04342C;
  --n1-mid: #085041;
  --n1-teal: #1D9E75;
  --n1-teal-light: #5DCAA5;
  --n1-teal-pale: #E1F5EE;
  --sidebar-w: 210px;
  --topbar-h: 52px;
  --panel-w: 75%;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-border: #EF9F27;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --red-border: #E24B4A;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --gray: #5F5E5A;
  --gray-bg: #F1EFE8;
  --border: #e2e0da;
  --text: #1a1a18;
  --text-muted: #6b6b67;
  --text-faint: #9a9a96;
  --bg: #f6f5f1;
  --surface: #ffffff;
  --col-planned-bg: #fdf8f0;
  --col-approved-bg: #f6f5f1;
  --col-action-bg: #f6f5f1;
  --col-complete-bg: #f4f8f6;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-h);
  background: var(--n1-dark);
  display: flex;
  align-items: center;
  padding: 0 20px 0 0;
  flex-shrink: 0;
}
.topbar-logo {
  width: var(--sidebar-w);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  flex-shrink: 0;
}
.logo-mark {
  width: 30px; height: 30px;
  background: var(--n1-teal);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: var(--n1-dark);
  letter-spacing: -0.5px;
}
.topbar-wordmark { color: var(--n1-teal-light); font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
.topbar-divider { width: 1px; height: 24px; background: #0a4035; margin: 0 16px; }
.topbar-title { color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 300; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn-new {
  background: var(--n1-teal); color: var(--n1-dark);
  border: none; padding: 7px 16px; border-radius: 6px;
  font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  cursor: pointer; letter-spacing: 0.01em; transition: background 0.15s;
}
.btn-new:hover { background: var(--n1-teal-light); }

/* ── LAYOUT ── */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--n1-mid);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto; padding: 20px 0;
}
.sidebar-section { margin-bottom: 28px; }
.sidebar-heading {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3); padding: 0 16px; margin-bottom: 6px; text-transform: uppercase;
}
.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 16px; font-size: 13px; color: var(--n1-teal-light);
  cursor: pointer; border: none; background: none;
  width: 100%; text-align: left; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.sidebar-item:hover { background: rgba(255,255,255,0.06); }
.sidebar-item.active { background: rgba(29,158,117,0.2); color: #fff; }
.s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.s-count {
  margin-left: auto; font-size: 11px;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
  padding: 1px 6px; border-radius: 10px; font-family: 'DM Mono', monospace;
}
.sidebar-icon { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }

/* ── MAIN ── */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* ── CONTENT ── */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── STATS ROW ── */
.stats-bar {
  display: flex; gap: 10px; padding: 16px 20px 0;
  flex-shrink: 0;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; flex: 1;
}
.stat-label { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.stat-num { font-size: 24px; font-weight: 300; font-family: 'DM Mono', monospace; line-height: 1; }
.stat-card.s-teal .stat-num { color: var(--n1-teal); }
.stat-card.s-amber .stat-num { color: var(--amber); }
.stat-card.s-red .stat-num { color: var(--red); }
.stat-card.s-blue .stat-num { color: var(--blue); }

/* ── KANBAN ── */
.kanban-area {
  flex: 1; overflow: hidden;
  display: flex; gap: 0;
  padding: 16px 20px 20px;
  gap: 12px;
}
.kanban-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.col-planned { background: var(--col-planned-bg); }
.col-approved { background: var(--col-approved-bg); }
.col-action { background: var(--col-action-bg); }
.col-complete { background: var(--col-complete-bg); }

.col-header {
  padding: 13px 14px 11px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
.col-count {
  margin-left: auto; font-size: 11px;
  background: rgba(0,0,0,0.06); color: var(--text-faint);
  padding: 1px 7px; border-radius: 10px; font-family: 'DM Mono', monospace;
}
.col-planned .col-header { border-bottom-color: #f0e6d0; }
.col-complete .col-header { border-bottom-color: #d8ede6; }

.col-body { flex: 1; overflow-y: auto; padding: 10px 10px; display: flex; flex-direction: column; gap: 7px; }

/* ── TICKET CARD ── */
.ticket-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 13px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.ticket-card:hover { border-color: #c8c6c0; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
.ticket-card.selected { border-color: var(--n1-teal); box-shadow: 0 0 0 1px var(--n1-teal); }
.ticket-card.is-overdue { border-color: var(--red-border); background: var(--red-bg); }
.ticket-card.is-overdue:hover { border-color: var(--red); box-shadow: 0 1px 5px rgba(162,45,45,0.12); }
.ticket-card.is-overdue.selected { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); }
.ticket-card.is-complete { opacity: 0.6; }

.tc-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; line-height: 1.35; }
.tc-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 7px; }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 500; white-space: nowrap;
}
.badge-planned { background: var(--amber-bg); color: var(--amber); }
.badge-approved { background: var(--n1-teal-pale); color: #085041; }
.badge-action { background: #E6F1FB; color: #185FA5; }
.badge-overdue { background: var(--red-bg); color: var(--red); }
.badge-complete { background: #E6F1FB; color: var(--blue); }
.badge-due { background: var(--gray-bg); color: var(--gray); }
.badge-type { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); font-size: 10px; }

.tc-due { font-size: 10px; color: var(--text-faint); font-family: 'DM Mono', monospace; }
.tc-due.overdue-text { color: var(--red); font-weight: 500; }

.tc-progress { display: flex; align-items: center; gap: 6px; }
.progress-bar { flex: 1; height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--n1-teal); border-radius: 2px; transition: width 0.3s; }
.is-overdue .progress-fill { background: var(--red); }
.progress-label { font-size: 10px; color: var(--text-faint); font-family: 'DM Mono', monospace; white-space: nowrap; }

.empty-col { padding: 20px 0; text-align: center; color: var(--text-faint); font-size: 12px; }

/* ── GANTT VIEW ── */
#view-gantt { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.gantt-wrap { flex: 1; overflow: auto; margin: 16px 20px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.gantt-table { border-collapse: collapse; font-size: 12px; }
.gantt-label-cell { width: 200px; max-width: 200px; padding: 8px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
.gantt-head-cell { padding: 6px 4px; font-size: 10px; color: var(--text-faint); border-bottom: 1px solid var(--border); text-align: center; font-family: 'DM Mono', monospace; white-space: nowrap; background: var(--bg); }
.gantt-cell { padding: 4px 2px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.gantt-bar { height: 18px; border-radius: 3px; background: var(--n1-teal); }
.gantt-bar.planned { background: var(--amber); }
.gantt-bar.overdue { background: var(--red); }
.gantt-today-line { border-left: 2px solid #E24B4A; }
.gantt-legend { display: flex; gap: 16px; padding: 10px 14px; font-size: 11px; color: var(--text-faint); border-top: 1px solid var(--border); flex-shrink: 0; }
.gantt-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }

/* ── DETAIL PANEL ── */
.detail-panel {
  width: var(--panel-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: absolute;
  top: 0; right: 0; bottom: 0;
  transform: translateX(100%);
  transition: transform 0.22s ease;
  z-index: 50;
  box-shadow: -4px 0 24px rgba(0,0,0,0.10);
}
.detail-panel.open { transform: translateX(0); }

.panel-topbar {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0;
}
.panel-close {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  color: var(--text-muted); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-family: 'DM Sans', sans-serif;
}
.panel-close:hover { background: var(--bg); }
.panel-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.35; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.panel-section { margin-bottom: 22px; }
.panel-section-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.09em; color: var(--text-faint); margin-bottom: 10px;
}
.panel-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel-meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.meta-item label { font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 3px; }
.meta-item .val { font-size: 13px; color: var(--text); }
.summary-block {
  background: var(--bg); border-radius: 8px; padding: 14px 16px;
  font-size: 13px; color: var(--text-muted); line-height: 1.7;
  min-height: 80px;
}

.checklist { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.cl-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-bottom: 1px solid var(--border); transition: background 0.1s;
}
.cl-row:last-child { border-bottom: none; }
.cl-row.is-na { background: var(--bg); }
.cl-check {
  width: 16px; height: 16px; border: 1.5px solid #c8c6c0; border-radius: 3px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.1s, border-color 0.1s;
}
.cl-check.checked { background: var(--n1-teal); border-color: var(--n1-teal); }
.cl-check.na-box { background: #e8e7e2; border-color: #d3d1c7; cursor: default; }
.cl-check svg { display: none; }
.cl-check.checked svg { display: block; }
.cl-team { font-size: 13px; flex: 1; }
.cl-team.na-text { color: var(--text-faint); font-style: italic; }
.na-btn {
  font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-faint);
  font-family: 'DM Sans', sans-serif; transition: all 0.1s;
}
.na-btn.na-on { background: #D3D1C7; color: #444441; border-color: #B4B2A9; }

.activity-thread { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.activity-item {
  background: var(--bg); border-radius: 7px; padding: 8px 11px;
  font-size: 12px; color: var(--text-muted); line-height: 1.5;
}
.activity-item strong { color: var(--text); font-weight: 500; }
.activity-item.audit { border-left: 2px solid var(--border); border-radius: 0 7px 7px 0; background: var(--surface); }
.comment-row { display: flex; gap: 8px; align-items: flex-end; }
.comment-input {
  flex: 1; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 11px; font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: var(--text); background: var(--surface); resize: none;
  min-height: 40px; max-height: 100px; outline: none; transition: border-color 0.15s;
}
.comment-input:focus { border-color: var(--n1-teal); }
.btn-post {
  background: var(--n1-teal); color: var(--n1-dark); border: none;
  border-radius: 7px; padding: 8px 14px; font-size: 12px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.btn-post:hover { background: var(--n1-teal-light); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(4,52,44,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 12px; padding: 28px;
  width: 520px; max-width: 94vw; max-height: 88vh; overflow-y: auto;
  border: 1px solid var(--border);
}
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-row label { font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.form-row select,
.form-row input[type="text"],
.form-row input[type="date"],
.form-row textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 11px; font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
}
.form-row select:focus, .form-row input:focus, .form-row textarea:focus { border-color: var(--n1-teal); }
.form-row textarea { min-height: 80px; resize: vertical; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
  background: transparent; border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; color: var(--text-muted);
}
.btn-submit {
  background: var(--n1-teal); color: var(--n1-dark); border: none;
  border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
}
.btn-submit:hover { background: var(--n1-teal-light); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark">91</div>
    <span class="topbar-wordmark">Ninety One</span>
  </div>
  <div class="topbar-divider"></div>
  <span class="topbar-title">Marketing change governance</span>
  <div class="topbar-actions">
    <button class="btn-new" onclick="openModal()">+ New ticket</button>
  </div>
</div>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Views</div>
      <button class="sidebar-item active" id="nav-pipeline" onclick="switchView('pipeline')">
        <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="4" height="12" rx="1" fill="currentColor" opacity="0.6"/><rect x="6" y="2" width="4" height="12" rx="1" fill="currentColor" opacity="0.6"/><rect x="11" y="2" width="4" height="12" rx="1" fill="currentColor" opacity="0.6"/></svg>
        Pipeline
      </button>
      <button class="sidebar-item" id="nav-gantt" onclick="switchView('gantt')">
        <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="8" height="2.5" rx="1" fill="currentColor" opacity="0.6"/><rect x="5" y="6.5" width="9" height="2.5" rx="1" fill="currentColor" opacity="0.6"/><rect x="2" y="11" width="6" height="2.5" rx="1" fill="currentColor" opacity="0.6"/></svg>
        Gantt
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading">Status</div>
      <button class="sidebar-item active" id="sf-all" onclick="setStatusFilter('all',this)">
        <span class="s-dot" style="background:rgba(255,255,255,0.3)"></span>All tickets
        <span class="s-count" id="cnt-all">0</span>
      </button>
      <button class="sidebar-item" id="sf-planned" onclick="setStatusFilter('planned',this)">
        <span class="s-dot" style="background:#BA7517"></span>Planned
        <span class="s-count" id="cnt-planned">0</span>
      </button>
      <button class="sidebar-item" id="sf-approved" onclick="setStatusFilter('approved',this)">
        <span class="s-dot" style="background:#1D9E75"></span>Approved
        <span class="s-count" id="cnt-approved">0</span>
      </button>
      <button class="sidebar-item" id="sf-action" onclick="setStatusFilter('action',this)">
        <span class="s-dot" style="background:#378ADD"></span>Action items
        <span class="s-count" id="cnt-action">0</span>
      </button>
      <button class="sidebar-item" id="sf-overdue" onclick="setStatusFilter('overdue',this)">
        <span class="s-dot" style="background:#E24B4A"></span>Overdue
        <span class="s-count" id="cnt-overdue">0</span>
      </button>
      <button class="sidebar-item" id="sf-complete" onclick="setStatusFilter('complete',this)">
        <span class="s-dot" style="background:#378ADD"></span>Complete
        <span class="s-count" id="cnt-complete">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading">Team</div>
      <button class="sidebar-item active" id="tf-all" onclick="setTeamFilter('all',this)">
        <span class="s-dot" style="background:rgba(255,255,255,0.3)"></span>All teams
      </button>
      <button class="sidebar-item" id="tf-ims" onclick="setTeamFilter('Investment Marketing Solutions',this)">
        <span class="s-dot" style="background:#5DCAA5"></span>Inv. Mktg Solutions
      </button>
      <button class="sidebar-item" id="tf-rfp" onclick="setTeamFilter('RFP',this)">
        <span class="s-dot" style="background:#5DCAA5"></span>RFP
      </button>
      <button class="sidebar-item" id="tf-web" onclick="setTeamFilter('Web',this)">
        <span class="s-dot" style="background:#5DCAA5"></span>Web
      </button>
      <button class="sidebar-item" id="tf-im" onclick="setTeamFilter('Investment Marketing',this)">
        <span class="s-dot" style="background:#5DCAA5"></span>Inv. Marketing
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="content">

      <!-- PIPELINE VIEW -->
      <div id="view-pipeline" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="stats-bar" id="stats-bar"></div>
        <div class="kanban-area" id="kanban-area"></div>
      </div>

      <!-- GANTT VIEW -->
      <div id="view-gantt" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="gantt-wrap" id="gantt-wrap">
          <table class="gantt-table" id="gantt-table"></table>
          <div class="gantt-legend">
            <span><span class="gantt-legend-dot" style="background:var(--n1-teal)"></span>Approved / action</span>
            <span><span class="gantt-legend-dot" style="background:var(--amber)"></span>Planned</span>
            <span><span class="gantt-legend-dot" style="background:var(--red)"></span>Overdue</span>
            <span style="border-left:2px solid #E24B4A;padding-left:8px;">Today</span>
          </div>
        </div>
      </div>

    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="panel-topbar">
        <button class="panel-close" onclick="closePanel()">&#x2715;</button>
        <div class="panel-title" id="panel-title"></div>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <h3>New ticket</h3>
    <div class="form-row">
      <label>Change type</label>
      <select id="f-type">
        <option value="">Select...</option>
        <option>People change — leaver</option>
        <option>People change — new starter</option>
        <option>Fund target change: Global Franchise</option>
        <option>Fund merge: Global Franchise — International Franchise</option>
        <option>Adhoc</option>
      </select>
    </div>
    <div class="form-row">
      <label>Change name</label>
      <input type="text" id="f-name" placeholder="e.g. Asia Bond Fund closure" />
    </div>
    <div class="form-row">
      <label>Status</label>
      <select id="f-status">
        <option value="planned">Planned — not approved</option>
        <option value="approved">Approved</option>
      </select>
    </div>
    <div class="form-row">
      <label>Due date</label>
      <input type="date" id="f-due" />
    </div>
    <div class="form-row">
      <label>Change summary</label>
      <textarea id="f-summary" placeholder="What exactly is the change? Include any relevant detail."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="createTicket()">Create ticket</button>
    </div>
  </div>
</div>

<script>
const TEAMS = ['Investment Marketing Solutions','RFP','Web','Investment Marketing'];

let tickets = [
  {
    id:1, type:'People change — leaver', name:'Jane Smith departure',
    status:'approved', due:'2026-05-02',
    summary:'Jane Smith (Senior PM, Global Franchise) is leaving on 2 May. Bio to be removed from website and all fund materials updated.',
    checklist: TEAMS.map(t=>({team:t,done:false,na:false})),
    comments:[{author:'Alana',text:'Web update already flagged with the web team.',ts:'28 Apr',audit:false}]
  },
  {
    id:2, type:'Fund target change: Global Franchise', name:'Global Franchise yield target revision',
    status:'planned', due:null,
    summary:'Proposed revision to the stated yield target for the Global Franchise Fund. Pending GPC sign-off before any marketing action.',
    checklist: TEAMS.map(t=>({team:t,done:false,na:false})),
    comments:[]
  },
  {
    id:3, type:'Adhoc', name:'Q1 2026 factsheet refresh',
    status:'approved', due:'2026-04-30',
    summary:"Routine Q1 factsheet updates across the Global Strategy Franchise. Data received from Geoff's team.",
    checklist: TEAMS.map((t,i)=>({team:t,done:i===1,na:i===2})),
    comments:[
      {author:'Anne',text:'RFP confirmed complete.',ts:'27 Apr',audit:false},
      {author:'System',text:'Marked "RFP" as complete.',ts:'27 Apr',audit:true},
      {author:'System',text:'Selected N/A for "Web" — no action required.',ts:'27 Apr',audit:true}
    ]
  },
  {
    id:4, type:'People change — new starter', name:'Marcus Osei joins Global Franchise',
    status:'approved', due:'2026-06-15',
    summary:'Marcus Osei joins as Portfolio Manager on the Global Franchise team from 15 June. Bio and fund materials to be updated ahead of start date.',
    checklist: TEAMS.map(t=>({team:t,done:false,na:false})),
    comments:[]
  },
  {
    id:5, type:'Adhoc', name:'H1 2026 capability map update',
    status:'planned', due:'2026-07-01',
    summary:'Biannual review of the capability map. Changes to fund descriptions and strategy positioning pending investment team sign-off.',
    checklist: TEAMS.map(t=>({team:t,done:false,na:false})),
    comments:[]
  }
];
let nextId = 6;
let selectedId = null;
let statusFilter = 'all';
let teamFilter = 'all';
let currentView = 'pipeline';

function today(){ return new Date().toISOString().split('T')[0]; }
function parseDate(d){ return d ? new Date(d+'T00:00:00') : null; }
function formatDate(d){
  if(!d) return null;
  return parseDate(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function tsNow(){
  return new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function daysUntil(d){
  if(!d) return null;
  const diff = parseDate(d) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

function isComplete(t){ return t.checklist.every(c=>c.done||c.na); }

/* Column assignment logic */
function getColumn(t){
  if(isComplete(t)) return 'complete';
  if(t.status==='planned') return 'planned';
  const days = daysUntil(t.due);
  if(days === null) return 'approved'; /* no due date, sits in approved */
  if(days < 0) return 'action';       /* overdue — stays in action, goes red */
  if(days <= 28) return 'action';     /* due within 4 weeks */
  return 'approved';                  /* due > 28 days away */
}

function isOverdue(t){
  if(!t.due || isComplete(t)) return false;
  return t.due < today() && t.status !== 'planned';
}

/* For sidebar status filter — maps filter key to column */
function passesStatusFilter(t){
  if(statusFilter==='all') return true;
  const col = getColumn(t);
  if(statusFilter==='overdue') return isOverdue(t);
  if(statusFilter==='planned') return col==='planned';
  if(statusFilter==='approved') return col==='approved';
  if(statusFilter==='action') return col==='action' && !isOverdue(t);
  if(statusFilter==='complete') return col==='complete';
  return true;
}

function teamActionNeeded(t, team){
  const row = t.checklist.find(c=>c.team===team);
  if(!row) return false;
  return !row.done && !row.na;
}

function passesTeamFilter(t){
  if(teamFilter==='all') return true;
  /* if ticket is complete for this team (ticked OR na), hide it */
  return teamActionNeeded(t, teamFilter);
}

function passesFilters(t){
  return passesStatusFilter(t) && passesTeamFilter(t);
}

function progressPct(t){
  const done = t.checklist.filter(c=>c.done||c.na).length;
  return Math.round((done/t.checklist.length)*100);
}

function renderAll(){
  updateCounts();
  if(currentView==='pipeline') renderPipeline();
  else renderGantt();
  if(selectedId) renderPanel(selectedId);
}

function updateCounts(){
  const counts={all:0,planned:0,approved:0,action:0,overdue:0,complete:0};
  tickets.forEach(t=>{
    counts.all++;
    const col=getColumn(t);
    if(col==='planned') counts.planned++;
    else if(col==='approved') counts.approved++;
    else if(col==='action') counts.action++;
    else if(col==='complete') counts.complete++;
    if(isOverdue(t)) counts.overdue++;
  });
  Object.entries(counts).forEach(([k,v])=>{
    const el=document.getElementById('cnt-'+k);
    if(el) el.textContent=v;
  });
}

function renderPipeline(){
  renderStats();
  renderKanban();
}

function renderStats(){
  const el=document.getElementById('stats-bar');
  let active=0,dueWeek=0,planned=0,overdue=0;
  tickets.forEach(t=>{
    if(!isComplete(t)&&t.status!=='planned') active++;
    const d=daysUntil(t.due);
    if(d!==null&&d>=0&&d<=7&&!isComplete(t)) dueWeek++;
    if(t.status==='planned') planned++;
    if(isOverdue(t)) overdue++;
  });
  el.innerHTML=`
    <div class="stat-card s-teal"><div class="stat-label">Active tickets</div><div class="stat-num">${active}</div></div>
    <div class="stat-card s-teal"><div class="stat-label">Due this week</div><div class="stat-num">${dueWeek}</div></div>
    <div class="stat-card s-amber"><div class="stat-label">Planned / not approved</div><div class="stat-num">${planned}</div></div>
    <div class="stat-card s-red"><div class="stat-label">Overdue</div><div class="stat-num">${overdue}</div></div>
  `;
}

function renderKanban(){
  const el=document.getElementById('kanban-area');
  const cols={planned:[],approved:[],action:[],complete:[]};
  tickets.forEach(t=>{
    if(passesFilters(t)) cols[getColumn(t)].push(t);
  });

  const colDefs=[
    {key:'planned', label:'Planned', dot:'#BA7517', cls:'col-planned', desc:'Proposed — not approved'},
    {key:'approved', label:'Approved', dot:'#1D9E75', cls:'col-approved', desc:'Approved · due > 30 days'},
    {key:'action', label:'Action items', dot:'#378ADD', cls:'col-action', desc:'Due within 4 weeks'},
    {key:'complete', label:'Complete', dot:'#9FE1CB', cls:'col-complete', desc:'All teams done'}
  ];

  el.innerHTML = colDefs.map(c=>`
    <div class="kanban-col ${c.cls}">
      <div class="col-header">
        <span class="col-dot" style="background:${c.dot}"></span>
        <span class="col-title">${c.label}</span>
        <span class="col-count">${cols[c.key].length}</span>
      </div>
      <div class="col-body">
        ${cols[c.key].length
          ? cols[c.key].map(t=>ticketCardHTML(t)).join('')
          : `<div class="empty-col">Nothing here</div>`}
      </div>
    </div>
  `).join('');
}

function ticketCardHTML(t){
  const overdue = isOverdue(t);
  const complete = isComplete(t);
  const pct = progressPct(t);
  const sel = selectedId===t.id;
  let cls = 'ticket-card';
  if(sel) cls += ' selected';
  if(overdue) cls += ' is-overdue';
  if(complete) cls += ' is-complete';

  let dueLine = '';
  if(!t.due){
    dueLine = '<span class="badge badge-due">Due date needed</span>';
  } else if(overdue){
    dueLine = `<span class="tc-due overdue-text">Overdue · ${formatDate(t.due)}</span>`;
  } else {
    const d = daysUntil(t.due);
    dueLine = `<span class="tc-due">${formatDate(t.due)}${d<=7?' · '+d+'d':''}</span>`;
  }

  return `<div class="${cls}" onclick="selectTicket(${t.id})">
    <div class="tc-name">${t.name}</div>
    <div class="tc-meta">
      <span class="badge badge-type">${t.type}</span>
      ${dueLine}
    </div>
    <div class="tc-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${pct}%</span>
    </div>
  </div>`;
}

function selectTicket(id){
  selectedId=id;
  document.getElementById('detail-panel').classList.add('open');
  renderPanel(id);
  renderKanban();
}

function closePanel(){
  selectedId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderKanban();
}

function renderPanel(id){
  const t=tickets.find(t=>t.id===id);
  if(!t) return;
  document.getElementById('panel-title').textContent=t.name;
  const scroll=document.getElementById('panel-body').scrollTop;
  const col=getColumn(t);
  const colLabels={planned:'Planned — not approved',approved:'Approved',action:'Action item',complete:'Complete'};

  document.getElementById('panel-body').innerHTML=`
    <div class="panel-section">
      <div class="panel-meta-grid">
        <div class="meta-item"><label>Change type</label><div class="val">${t.type}</div></div>
        <div class="meta-item"><label>Column</label><div class="val">${colLabels[col]}</div></div>
        <div class="meta-item"><label>Due date</label><div class="val" style="${!t.due?'color:var(--amber)':isOverdue(t)?'color:var(--red)':''}">${t.due?formatDate(t.due):'Date needed'}</div></div>
        <div class="meta-item"><label>Progress</label><div class="val">${progressPct(t)}% complete</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-label">Summary</div>
      <div class="summary-block">${t.summary}</div>
    </div>
    <div class="panel-cols">
      <div>
        <div class="panel-section">
          <div class="panel-section-label">Team checklist</div>
          <div class="checklist">
            ${t.checklist.map((c,i)=>checkRowHTML(t.id,c,i)).join('')}
          </div>
        </div>
      </div>
      <div>
        <div class="panel-section">
          <div class="panel-section-label">Activity & comments</div>
          <div class="activity-thread">
            ${t.comments.map(c=>`<div class="activity-item${c.audit?' audit':''}"><strong>${c.author}</strong> &middot; ${c.ts}<br/>${c.text}</div>`).join('')}
          </div>
          <div class="comment-row">
            <textarea class="comment-input" id="cmt-${t.id}" placeholder="Add a comment…" rows="2"></textarea>
            <button class="btn-post" onclick="addComment(${t.id})">Post</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('panel-body').scrollTop=scroll;
}

function checkRowHTML(tid,c,i){
  if(c.na){
    return `<div class="cl-row is-na">
      <div class="cl-check na-box">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="2" y1="2" x2="8" y2="8" stroke="#9a9a96" stroke-width="1.5"/><line x1="8" y1="2" x2="2" y2="8" stroke="#9a9a96" stroke-width="1.5"/></svg>
      </div>
      <span class="cl-team na-text">${c.team}</span>
      <button class="na-btn na-on" onclick="toggleNA(${tid},${i})">N/A</button>
    </div>`;
  }
  return `<div class="cl-row">
    <div class="cl-check${c.done?' checked':''}" onclick="toggleCheck(${tid},${i})">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="cl-team">${c.team}</span>
    <button class="na-btn" onclick="toggleNA(${tid},${i})">N/A</button>
  </div>`;
}

function toggleCheck(tid,idx){
  const t=tickets.find(t=>t.id===tid);
  if(t.checklist[idx].na) return;
  t.checklist[idx].done=!t.checklist[idx].done;
  const team=t.checklist[idx].team;
  t.comments.push({author:'System',text:`${t.checklist[idx].done?'Marked':'Unmarked'} "${team}" as ${t.checklist[idx].done?'complete':'incomplete'}.`,ts:tsNow(),audit:true});
  renderAll();
}

function toggleNA(tid,idx){
  const t=tickets.find(t=>t.id===tid);
  t.checklist[idx].na=!t.checklist[idx].na;
  const team=t.checklist[idx].team;
  if(t.checklist[idx].na){
    t.checklist[idx].done=false;
    t.comments.push({author:'System',text:`Selected N/A for "${team}" — no action required.`,ts:tsNow(),audit:true});
  } else {
    t.comments.push({author:'System',text:`Removed N/A for "${team}".`,ts:tsNow(),audit:true});
  }
  renderAll();
}

function addComment(tid){
  const inp=document.getElementById('cmt-'+tid);
  const text=inp.value.trim();
  if(!text) return;
  const t=tickets.find(t=>t.id===tid);
  t.comments.push({author:'You',text,ts:tsNow(),audit:false});
  inp.value='';
  renderAll();
}

function renderGantt(){
  const el=document.getElementById('gantt-table');
  const dated=tickets.filter(t=>t.due);
  if(!dated.length){el.innerHTML='<tr><td style="padding:24px;color:var(--text-faint);font-size:13px;">No tickets with due dates yet.</td></tr>';return;}
  const minD=new Date(Math.min(...dated.map(t=>parseDate(t.due))));
  const maxD=new Date(Math.max(...dated.map(t=>parseDate(t.due))));
  minD.setDate(minD.getDate()-4);maxD.setDate(maxD.getDate()+4);
  const days=[];const d=new Date(minD);
  while(d<=maxD){days.push(new Date(d));d.setDate(d.getDate()+1);}
  const cellW=Math.max(18,Math.floor(560/days.length));
  let head='<thead><tr><th class="gantt-label-cell" style="text-align:left;background:var(--bg);">Change</th>';
  days.forEach((day,i)=>{
    const isToday=day.toISOString().split('T')[0]===today();
    const lbl=(day.getDate()===1||i===0)?day.toLocaleDateString('en-GB',{day:'numeric',month:'short'}):(day.getDate()%5===0?day.getDate():'');
    head+=`<th class="gantt-head-cell${isToday?' gantt-today-line':''}" style="width:${cellW}px;">${lbl}</th>`;
  });
  head+='</tr></thead>';
  let body='<tbody>';
  dated.forEach(t=>{
    const dueIdx=days.findIndex(d=>d.toISOString().split('T')[0]===t.due);
    const barCls=t.status==='planned'?'planned':isOverdue(t)?'overdue':'';
    body+=`<tr><td class="gantt-label-cell">${t.name}</td>`;
    days.forEach((day,i)=>{
      const isToday=day.toISOString().split('T')[0]===today();
      body+=`<td class="gantt-cell${isToday?' gantt-today-line':''}" style="width:${cellW}px;">`;
      if(i===dueIdx) body+=`<div class="gantt-bar ${barCls}" style="width:${cellW-4}px;"></div>`;
      body+='</td>';
    });
    body+='</tr>';
  });
  body+='</tbody>';
  el.innerHTML=head+body;
}

function switchView(v){
  currentView=v;
  document.getElementById('view-pipeline').style.display=v==='pipeline'?'flex':'none';
  document.getElementById('view-gantt').style.display=v==='gantt'?'flex':'none';
  document.getElementById('nav-pipeline').classList.toggle('active',v==='pipeline');
  document.getElementById('nav-gantt').classList.toggle('active',v==='gantt');
  closePanel();
  renderAll();
}

function setStatusFilter(f,btn){
  statusFilter=f;
  document.querySelectorAll('[id^="sf-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPipeline();
}

function setTeamFilter(f,btn){
  teamFilter=f;
  document.querySelectorAll('[id^="tf-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPipeline();
}

function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function maybeCloseModal(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function createTicket(){
  const type=document.getElementById('f-type').value;
  const name=document.getElementById('f-name').value.trim();
  const status=document.getElementById('f-status').value;
  const due=document.getElementById('f-due').value||null;
  const summary=document.getElementById('f-summary').value.trim();
  if(!name||!type) return;
  tickets.push({id:nextId++,type,name,status,due,summary:summary||'No summary provided.',checklist:TEAMS.map(t=>({team:t,done:false,na:false})),comments:[]});
  ['f-type','f-name','f-due','f-summary'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='planned';
  closeModal();
  renderAll();
}

renderAll();
</script>
</body>
</html>
